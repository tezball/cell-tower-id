name: CI/CD

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  ci:
    name: Test, lint, build debug APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run unit tests
        run: ./gradlew test

      - name: Run lint
        run: ./gradlew lint

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

  release:
    name: Build signed release (AAB + APK)
    needs: ci
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode keystore
        env:
          SIGNING_KEY_BASE64: ${{ secrets.SIGNING_KEY_BASE64 }}
        run: echo "$SIGNING_KEY_BASE64" | base64 --decode > release.keystore

      - name: Write keystore.properties
        env:
          STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: |
          cat > keystore.properties <<EOF
          storeFile=release.keystore
          storePassword=$STORE_PASSWORD
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASSWORD
          EOF

      - name: Build release AAB
        run: ./gradlew bundleRelease

      - name: Build release APK
        run: ./gradlew assembleRelease

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: app/build/outputs/bundle/release/app-release.aab
          retention-days: 30

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: app/build/outputs/apk/release/app-release.apk
          retention-days: 30

      # Optional: auto-upload to Play Console Internal track on tag pushes if PLAY_SERVICE_ACCOUNT_JSON is set.
      # See docs/release-checklist.md for service-account setup.
      - name: Check Play Console secret
        id: check_play_secret
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          PLAY_JSON: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -n "$PLAY_JSON" ]; then
            echo "has_secret=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_secret=false" >> "$GITHUB_OUTPUT"
            echo "::warning::PLAY_SERVICE_ACCOUNT_JSON secret not set; skipping Play Console upload. Download the AAB artifact above and upload manually."
          fi

      - name: Upload to Play Console (Internal track)
        if: startsWith(github.ref, 'refs/tags/v') && steps.check_play_secret.outputs.has_secret == 'true'
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.celltowerid.android
          releaseFiles: app/build/outputs/bundle/release/app-release.aab
          track: internal
          status: draft

  deploy-website:
    name: Deploy website to GitHub Pages
    needs: ci
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest

    concurrency:
      group: pages
      cancel-in-progress: false

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
